<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- Primary SEO -->
    <title>AdHub Kenya – Buy &amp; Sell Anything in Kenya</title>
    <meta name="description" content="AdHub Kenya is Kenya's free classifieds marketplace. Buy and sell cars, property, electronics, phones, fashion, jobs and more across all 47 counties." />
    <meta name="keywords" content="buy and sell Kenya, Kenya classifieds, free ads Kenya, cars for sale Kenya, property Kenya, electronics Kenya, jobs Kenya, second hand Kenya" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://adhubkenya.co.ke/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AdHub Kenya" />
    <meta property="og:title" content="AdHub Kenya – Buy &amp; Sell Anything in Kenya" />
    <meta property="og:description" content="Kenya's free classifieds marketplace. Buy and sell cars, property, electronics, jobs and more across all 47 counties." />
    <meta property="og:url" content="https://adhubkenya.co.ke/" />
    <meta property="og:image" content="https://adhubkenya.co.ke/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AdHub Kenya – Buy &amp; Sell Anything in Kenya" />
    <meta name="twitter:description" content="Kenya's free classifieds marketplace. Buy and sell cars, property, electronics, jobs and more." />
    <meta name="twitter:image" content="https://adhubkenya.co.ke/og-image.png" />

    <!-- Theme color (Android Chrome, Safari) -->
    <meta name="theme-color" content="#1a5c32" />

    <!-- Structured Data: Organisation (Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AdHub Kenya",
      "url": "https://adhubkenya.co.ke",
      "logo": "https://adhubkenya.co.ke/favicon.ico",
      "description": "Kenya's free online classifieds marketplace for buying and selling cars, property, electronics, and more.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Nairobi, Kenya"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Kenya"
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AdHub Kenya",
      "url": "https://adhubkenya.co.ke",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://adhubkenya.co.ke/browse?keyword={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
